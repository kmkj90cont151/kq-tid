<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light">
    <title>在線位置研究ビューア</title>
    <link rel="stylesheet" href="./assets/styles.css">
  </head>
  <body>
    <div class="page-glow"></div>
    <div class="app-shell">
      <header class="hero">
        <div class="hero__eyebrow">GitHub Pages / Python 静的ビルド</div>
        <div class="hero__main">
          <div class="hero__copy">
            <h1>在線位置研究ビューア</h1>
            <p class="hero__lead">
              京急・都営浅草線・京成線・京成松戸線をタブで切り替えながら、在線位置、遅延、行先、列車別時刻表を確認できます。
              一覧表示に加えて、位置の流れを追いやすい路線図モードも使えます。
            </p>
          </div>
          <button id="refreshButton" class="primary-button" type="button">再取得</button>
        </div>
        <div class="hero__meta">
          <span id="buildTimestamp">ビルド時刻: -</span>
          <span id="buildVersion">バージョン: -</span>
          <span id="networkCount">路線数: -</span>
        </div>
      </header>

      <main class="content">
        <section class="panel">
          <div class="controls__row">
            <label class="field">
              <span class="field__label">検索</span>
              <input
                id="searchInput"
                class="text-input"
                type="search"
                placeholder="列番 / 路線 / 駅名 / 種別 / 行先 / 車両"
                autocomplete="off"
              >
            </label>
            <label class="toggle">
              <input id="flaggedOnlyToggle" type="checkbox">
              <span>要確認のみ</span>
            </label>
            <label class="toggle">
              <input id="showRawToggle" type="checkbox" checked>
              <span>raw メモ表示</span>
            </label>
          </div>

          <div id="modeBar" class="mode-bar" role="tablist" aria-label="表示モード">
            <button class="mode-button is-active" type="button" data-view-mode="list" aria-pressed="true">一覧</button>
            <button class="mode-button" type="button" data-view-mode="route" aria-pressed="false">路線図</button>
          </div>

          <div id="tabBar" class="tab-bar" aria-label="路線選択"></div>
        </section>

        <section id="statusBar" class="status-grid"></section>
        <section id="networkMeta" class="panel info-panel"></section>
        <section id="listings" class="network-panels"></section>
      </main>

      <footer class="footer">
        GitHub Pages では Python を実行時に動かせないため、このサイトは Python で生成した JSON を静的配信しています。
      </footer>
    </div>

    <script src="./assets/app.js"></script>
  </body>
</html>
